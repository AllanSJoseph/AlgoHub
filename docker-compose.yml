version: "3.9"

x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  frontend:
    image: allansjoseph/algohub-frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
  
  backend:
    image: allansjoseph/algohub-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    volumes:
      - video_uploads:/app/uploads
    depends_on:
      - judge0
      - redis_app
  
  judge0:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    environment:
      REDIS_HOST: redis_judge0
      POSTGRES_HOST: db
    <<: *default-logging
    restart: always
    depends_on:
      - redis_judge0
      - db
  
  judge0-worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: always
    depends_on:
      - judge0
      - redis_judge0
      - db

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0-db:/var/lib/postgresql/data
    <<: *default-logging
    restart: always
  
  redis_judge0:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always
  
  redis_app:
    image: redis:7.2.4
    ports:
      - "6379:6379"
  
volumes:
  judge0-db:
  video_uploads: